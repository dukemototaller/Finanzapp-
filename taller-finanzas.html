<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Taller Finanzas">
<title>Finanzas Taller</title>
<link rel="manifest" href="#" id="manifest-link">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --bg2: #161821;
    --bg3: #1e2030;
    --card: #1a1d2e;
    --border: #2a2d3e;
    --accent: #f97316;
    --accent2: #fb923c;
    --green: #22c55e;
    --red: #ef4444;
    --blue: #3b82f6;
    --text: #e2e4f0;
    --text2: #8b8fa8;
    --text3: #5a5d72;
    --radius: 14px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  .light {
    --bg: #f4f5f7;
    --bg2: #ebedf2;
    --bg3: #e2e4ea;
    --card: #ffffff;
    --border: #d4d6e0;
    --text: #1a1d2e;
    --text2: #5a5d72;
    --text3: #9ea3b8;
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; transition: background 0.3s, color 0.3s; }

  /* LAYOUT */
  #app { display: flex; flex-direction: column; height: 100%; max-width: 900px; margin: 0 auto; }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; background: var(--bg2);
    border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(10px);
  }
  .topbar-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 2px; color: var(--accent); }
  .topbar-actions { display: flex; gap: 10px; align-items: center; }
  .icon-btn {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 10px;
    color: var(--text2); width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 1.1rem; transition: all 0.2s;
  }
  .icon-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* NAV */
  .bottom-nav {
    display: flex; background: var(--bg2); border-top: 1px solid var(--border);
    padding: 6px 0; padding-bottom: calc(6px + env(safe-area-inset-bottom));
    position: sticky; bottom: 0; z-index: 100;
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 6px; cursor: pointer; color: var(--text3); transition: color 0.2s; font-size: 0.7rem; font-weight: 500;
  }
  .nav-item.active { color: var(--accent); }
  .nav-icon { font-size: 1.35rem; }

  /* CONTENT */
  .content { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }

  /* CARDS */
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; margin-bottom: 14px; box-shadow: var(--shadow);
  }
  .card-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 1.5px; color: var(--text2); margin-bottom: 14px; }

  /* DASHBOARD */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .stat-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 12px; box-shadow: var(--shadow);
  }
  .stat-label { font-size: 0.7rem; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 1.65rem; letter-spacing: 1px; }
  .stat-value.green { color: var(--green); }
  .stat-value.orange { color: var(--accent); }
  .stat-value.blue { color: var(--blue); }
  .stat-value.red { color: var(--red); }
  .stat-big { grid-column: 1 / -1; display: flex; align-items: center; justify-content: space-between; }
  .stat-big .stat-value { font-size: 2.2rem; }

  /* SECTION HEADER */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .section-header h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 2px; }
  .btn-primary {
    background: var(--accent); color: #fff; border: none; border-radius: 10px;
    padding: 9px 16px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.2s, transform 0.1s;
  }
  .btn-primary:active { transform: scale(0.97); }
  .btn-primary:hover { background: var(--accent2); }

  /* SEARCH */
  .search-bar { position: relative; margin-bottom: 14px; }
  .search-bar input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 14px 10px 38px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
    outline: none; transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--text3); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 1rem; }

  /* TABLE / LIST */
  .list-item {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px; margin-bottom: 10px; box-shadow: var(--shadow);
    animation: slideIn 0.25s ease;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .item-title { font-weight: 600; font-size: 0.95rem; color: var(--text); }
  .item-sub { font-size: 0.8rem; color: var(--text2); margin-top: 2px; }
  .item-date { font-size: 0.75rem; color: var(--text3); }
  .item-amounts { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .amount-tag { display: flex; flex-direction: column; }
  .amount-tag span:first-child { font-size: 0.65rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; }
  .amount-tag span:last-child { font-family: 'Bebas Neue', sans-serif; font-size: 1.15rem; letter-spacing: 0.5px; }
  .amount-green { color: var(--green); }
  .amount-orange { color: var(--accent); }
  .amount-blue { color: var(--blue); }
  .item-actions { display: flex; gap: 8px; margin-top: 10px; }
  .btn-sm {
    flex: 1; padding: 7px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg3);
    color: var(--text2); font-size: 0.8rem; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500;
    transition: all 0.2s;
  }
  .btn-sm.edit:hover { background: var(--blue); color: #fff; border-color: var(--blue); }
  .btn-sm.del:hover { background: var(--red); color: #fff; border-color: var(--red); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 200;
    display: flex; align-items: flex-end; justify-content: center;
    padding: 0; backdrop-filter: blur(4px);
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--bg2); border-radius: 20px 20px 0 0; border: 1px solid var(--border);
    border-bottom: none; width: 100%; max-width: 900px; padding: 24px 20px;
    padding-bottom: calc(24px + env(safe-area-inset-bottom));
    max-height: 90vh; overflow-y: auto;
    animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 2px; }
  .modal-close { width: 32px; height: 32px; background: var(--bg3); border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text2); font-size: 1.1rem; }

  /* FORM */
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 0.75rem; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; display: block; }
  .form-input, .form-textarea {
    width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px;
    padding: 11px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
    outline: none; transition: border-color 0.2s;
  }
  .form-input:focus, .form-textarea:focus { border-color: var(--accent); }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-save { flex: 2; padding: 13px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 1rem; cursor: pointer; transition: background 0.2s; }
  .btn-save:hover { background: var(--accent2); }
  .btn-cancel { flex: 1; padding: 13px; background: var(--bg3); color: var(--text2); border: 1px solid var(--border); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 0.95rem; cursor: pointer; }

  /* CONFIRM DIALOG */
  .confirm-modal { border-radius: 20px; max-width: 340px; margin: auto; width: 90%; animation: popIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); }
  @keyframes popIn { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }
  .confirm-modal .modal-overlay { align-items: center; }

  /* BADGE */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
  .badge-green { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge-orange { background: rgba(249,115,22,0.15); color: var(--accent); }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 48px 20px; color: var(--text3); }
  .empty-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.5; }
  .empty p { font-size: 0.95rem; }

  /* CHART BAR */
  .mini-chart { margin-top: 4px; }
  .chart-bar-wrap { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .chart-label { width: 55px; font-size: 0.7rem; color: var(--text2); text-align: right; flex-shrink: 0; }
  .chart-bar-bg { flex: 1; background: var(--bg3); border-radius: 4px; height: 8px; overflow: hidden; }
  .chart-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1); }
  .chart-val { width: 60px; font-size: 0.7rem; color: var(--text2); flex-shrink: 0; }

  /* SCROLL */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* TOAST */
  #toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--green); color: #fff; padding: 10px 20px; border-radius: 20px;
    font-size: 0.85rem; font-weight: 500; z-index: 999; opacity: 0;
    transition: all 0.3s; pointer-events: none; white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (min-width: 600px) {
    .stats-grid { grid-template-columns: repeat(4, 1fr); }
    .stat-big { grid-column: auto; }
    .content { padding: 20px; }
  }
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="topbar-title">⚙ Taller</div>
    <div class="topbar-actions">
      <button class="icon-btn" onclick="exportCSV()" title="Exportar CSV">📊</button>
      <button class="icon-btn" onclick="toggleTheme()" id="theme-btn" title="Modo oscuro/claro">🌙</button>
    </div>
  </div>

  <div class="content" id="content"><!-- dynamic --></div>

  <nav class="bottom-nav">
    <div class="nav-item active" onclick="navigate('dashboard')" id="nav-dashboard">
      <span class="nav-icon">📈</span><span>Dashboard</span>
    </div>
    <div class="nav-item" onclick="navigate('trabajos')" id="nav-trabajos">
      <span class="nav-icon">🔧</span><span>Trabajos</span>
    </div>
    <div class="nav-item" onclick="navigate('gastos')" id="nav-gastos">
      <span class="nav-icon">💸</span><span>Gastos</span>
    </div>
  </nav>
</div>

<!-- MODAL CONTAINER -->
<div id="modal-container"></div>
<div id="toast">✓ Guardado</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────
let data = { trabajos: [], gastos: [] };
let currentPage = 'dashboard';
let darkMode = true;
let searchQ = '';

function loadData() {
  try {
    const saved = localStorage.getItem('taller_data_v2');
    if (saved) data = JSON.parse(saved);
    const theme = localStorage.getItem('taller_theme');
    if (theme === 'light') { darkMode = false; document.body.classList.add('light'); document.getElementById('theme-btn').textContent = '☀️'; }
  } catch(e) {}
}

function saveData() {
  localStorage.setItem('taller_data_v2', JSON.stringify(data));
  showToast('Guardado ✓');
}

// ─── UTILS ───────────────────────────────────────────────────────
const fmt = n => '$' + Number(n||0).toLocaleString('es-MX', {minimumFractionDigits:0, maximumFractionDigits:0});
const today = () => new Date().toISOString().slice(0,10);
const weekAgo = () => { const d = new Date(); d.setDate(d.getDate()-6); return d.toISOString().slice(0,10); };
const monthStart = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`; };
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,5);

function showToast(msg, type='green') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.background = type === 'red' ? 'var(--red)' : 'var(--green)';
  t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── STATS ───────────────────────────────────────────────────────
function getStats() {
  const t = today(), ws = weekAgo(), ms = monthStart();
  const trabajos = data.trabajos || [];
  const gastos = data.gastos || [];
  const filter = (from, to) => trabajos.filter(j => j.fecha >= from && j.fecha <= to);
  const sum = (arr, key) => arr.reduce((s,j) => s + Number(j[key]||0), 0);

  const tod = filter(t, t), week = filter(ws, t), month = filter(ms, t);
  return {
    ingresosHoy: sum(tod,'total'), gananciaHoy: sum(tod,'ganancia'),
    ingresosSemana: sum(week,'total'), gananciaSemana: sum(week,'ganancia'),
    ingresosMes: sum(month,'total'), gananciaMes: sum(month,'ganancia'),
    gastosMes: gastos.filter(g => g.fecha >= ms && g.fecha <= t).reduce((s,g) => s+Number(g.costo||0),0),
    totalTrabajos: trabajos.length
  };
}

// ─── NAVIGATE ────────────────────────────────────────────────────
function navigate(page) {
  currentPage = page; searchQ = '';
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-' + page).classList.add('active');
  render();
}

function render() {
  const content = document.getElementById('content');
  if (currentPage === 'dashboard') content.innerHTML = renderDashboard();
  else if (currentPage === 'trabajos') content.innerHTML = renderTrabajos();
  else if (currentPage === 'gastos') content.innerHTML = renderGastos();
}

// ─── DASHBOARD ───────────────────────────────────────────────────
function renderDashboard() {
  const s = getStats();
  const trabajos = data.trabajos || [];
  
  // Last 6 months chart data
  const months = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(); d.setMonth(d.getMonth() - i);
    const ym = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const label = d.toLocaleDateString('es-MX', {month:'short'});
    const ing = trabajos.filter(j => j.fecha && j.fecha.startsWith(ym)).reduce((s,j) => s+Number(j.total||0),0);
    months.push({ label, ing });
  }
  const maxIng = Math.max(...months.map(m => m.ing), 1);

  const chartRows = months.map(m => `
    <div class="chart-bar-wrap">
      <span class="chart-label">${m.label}</span>
      <div class="chart-bar-bg"><div class="chart-bar-fill" style="width:${(m.ing/maxIng*100).toFixed(1)}%;background:var(--accent)"></div></div>
      <span class="chart-val">${fmt(m.ing)}</span>
    </div>`).join('');

  return `
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Ingresos Hoy</div>
      <div class="stat-value orange">${fmt(s.ingresosHoy)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Ganancia Hoy</div>
      <div class="stat-value green">${fmt(s.gananciaHoy)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Ingresos Semana</div>
      <div class="stat-value orange">${fmt(s.ingresosSemana)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Ganancia Semana</div>
      <div class="stat-value green">${fmt(s.gananciaSemana)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Ingresos del Mes</div>
      <div class="stat-value orange">${fmt(s.ingresosMes)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Ganancia del Mes</div>
      <div class="stat-value green">${fmt(s.gananciaMes)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Gastos del Mes</div>
      <div class="stat-value red">${fmt(s.gastosMes)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Trabajos</div>
      <div class="stat-value blue">${s.totalTrabajos}</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Ingresos por Mes</div>
    <div class="mini-chart">${chartRows}</div>
  </div>

  ${trabajos.length > 0 ? `
  <div class="card">
    <div class="card-title">Últimos Trabajos</div>
    ${trabajos.slice(-3).reverse().map(j => `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
        <div>
          <div style="font-weight:600;font-size:0.9rem">${esc(j.cliente)}</div>
          <div style="font-size:0.75rem;color:var(--text2)">${esc(j.moto)} · ${j.fecha}</div>
        </div>
        <div style="text-align:right">
          <div style="font-family:'Bebas Neue';font-size:1.1rem;color:var(--accent)">${fmt(j.total)}</div>
          <div style="font-size:0.72rem;color:var(--green)">+${fmt(j.ganancia)}</div>
        </div>
      </div>`).join('')}
  </div>` : ''}`;
}

// ─── TRABAJOS ────────────────────────────────────────────────────
function renderTrabajos() {
  let items = [...(data.trabajos || [])].reverse();
  if (searchQ) items = items.filter(j =>
    j.cliente?.toLowerCase().includes(searchQ) ||
    j.moto?.toLowerCase().includes(searchQ) ||
    j.trabajo?.toLowerCase().includes(searchQ)
  );

  return `
  <div class="section-header">
    <h2>Trabajos</h2>
    <button class="btn-primary" onclick="openTrabajoModal()">＋ Nuevo</button>
  </div>
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="Buscar cliente o moto…" value="${esc(searchQ)}"
      oninput="searchQ=this.value.toLowerCase();render()">
  </div>
  ${items.length === 0 ? `<div class="empty"><div class="empty-icon">🔧</div><p>${searchQ ? 'Sin resultados' : 'Sin trabajos registrados'}</p></div>` : ''}
  ${items.map(j => `
    <div class="list-item">
      <div class="item-header">
        <div>
          <div class="item-title">${esc(j.cliente)}</div>
          <div class="item-sub">🏍 ${esc(j.moto)}</div>
          <div class="item-sub" style="margin-top:4px;font-size:0.8rem">${esc(j.trabajo)}</div>
        </div>
        <div class="item-date">${j.fecha}</div>
      </div>
      <div class="item-amounts">
        <div class="amount-tag"><span>Mano de Obra</span><span class="amount-green">${fmt(j.manoObra)}</span></div>
        <div class="amount-tag"><span>Refacciones</span><span class="amount-blue">${fmt(j.refacciones)}</span></div>
        <div class="amount-tag"><span>Total</span><span class="amount-orange">${fmt(j.total)}</span></div>
      </div>
      <div class="item-actions">
        <button class="btn-sm edit" onclick="openTrabajoModal('${j.id}')">✏️ Editar</button>
        <button class="btn-sm del" onclick="confirmDelete('trabajo','${j.id}')">🗑 Eliminar</button>
      </div>
    </div>`).join('')}`;
}

// ─── GASTOS ──────────────────────────────────────────────────────
function renderGastos() {
  let items = [...(data.gastos || [])].reverse();
  if (searchQ) items = items.filter(g =>
    g.concepto?.toLowerCase().includes(searchQ)
  );

  const totalMes = (data.gastos||[]).filter(g => g.fecha >= monthStart()).reduce((s,g) => s+Number(g.costo||0),0);

  return `
  <div class="section-header">
    <h2>Gastos</h2>
    <button class="btn-primary" onclick="openGastoModal()">＋ Nuevo</button>
  </div>
  <div class="card" style="margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;padding:12px 16px">
    <span style="font-size:0.8rem;color:var(--text2)">Gastos del mes</span>
    <span style="font-family:'Bebas Neue';font-size:1.4rem;color:var(--red)">${fmt(totalMes)}</span>
  </div>
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="Buscar concepto…" value="${esc(searchQ)}"
      oninput="searchQ=this.value.toLowerCase();render()">
  </div>
  ${items.length === 0 ? `<div class="empty"><div class="empty-icon">💸</div><p>${searchQ ? 'Sin resultados' : 'Sin gastos registrados'}</p></div>` : ''}
  ${items.map(g => `
    <div class="list-item">
      <div class="item-header">
        <div>
          <div class="item-title">${esc(g.concepto)}</div>
          <div class="item-sub" style="margin-top:2px"><span class="badge badge-orange">Gasto</span></div>
        </div>
        <div style="text-align:right">
          <div class="item-date">${g.fecha}</div>
          <div style="font-family:'Bebas Neue';font-size:1.3rem;color:var(--red);margin-top:4px">${fmt(g.costo)}</div>
        </div>
      </div>
      <div class="item-actions">
        <button class="btn-sm edit" onclick="openGastoModal('${g.id}')">✏️ Editar</button>
        <button class="btn-sm del" onclick="confirmDelete('gasto','${g.id}')">🗑 Eliminar</button>
      </div>
    </div>`).join('')}`;
}

// ─── MODALS ──────────────────────────────────────────────────────
function openTrabajoModal(id) {
  const j = id ? data.trabajos.find(t => t.id === id) : null;
  const html = `
  <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">${j ? 'Editar Trabajo' : 'Nuevo Trabajo'}</div>
        <div class="modal-close" onclick="closeModal()">✕</div>
      </div>
      <div class="form-group">
        <label class="form-label">Fecha</label>
        <input class="form-input" type="date" id="f-fecha" value="${j?.fecha||today()}">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Cliente</label>
          <input class="form-input" type="text" id="f-cliente" placeholder="Nombre" value="${esc(j?.cliente||'')}">
        </div>
        <div class="form-group">
          <label class="form-label">Moto</label>
          <input class="form-input" type="text" id="f-moto" placeholder="Marca/Modelo" value="${esc(j?.moto||'')}">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Trabajo realizado</label>
        <textarea class="form-textarea" id="f-trabajo" placeholder="Describe el trabajo…">${esc(j?.trabajo||'')}</textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Mano de Obra ($)</label>
          <input class="form-input" type="number" id="f-mano" placeholder="0" value="${j?.manoObra||''}" inputmode="decimal">
        </div>
        <div class="form-group">
          <label class="form-label">Refacciones ($)</label>
          <input class="form-input" type="number" id="f-ref" placeholder="0" value="${j?.refacciones||''}" inputmode="decimal">
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn-save" onclick="saveTrabajo(${JSON.stringify(id||null)})">💾 Guardar</button>
      </div>
    </div>
  </div>`;
  document.getElementById('modal-container').innerHTML = html;
}

function openGastoModal(id) {
  const g = id ? data.gastos.find(g => g.id === id) : null;
  const html = `
  <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">${g ? 'Editar Gasto' : 'Nuevo Gasto'}</div>
        <div class="modal-close" onclick="closeModal()">✕</div>
      </div>
      <div class="form-group">
        <label class="form-label">Fecha</label>
        <input class="form-input" type="date" id="g-fecha" value="${g?.fecha||today()}">
      </div>
      <div class="form-group">
        <label class="form-label">Concepto</label>
        <input class="form-input" type="text" id="g-concepto" placeholder="Descripción del gasto" value="${esc(g?.concepto||'')}">
      </div>
      <div class="form-group">
        <label class="form-label">Costo ($)</label>
        <input class="form-input" type="number" id="g-costo" placeholder="0" value="${g?.costo||''}" inputmode="decimal">
      </div>
      <div class="form-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn-save" onclick="saveGasto(${JSON.stringify(id||null)})">💾 Guardar</button>
      </div>
    </div>
  </div>`;
  document.getElementById('modal-container').innerHTML = html;
}

function closeModal() { document.getElementById('modal-container').innerHTML = ''; }

function saveTrabajo(id) {
  const fecha = document.getElementById('f-fecha').value;
  const cliente = document.getElementById('f-cliente').value.trim();
  const moto = document.getElementById('f-moto').value.trim();
  const trabajo = document.getElementById('f-trabajo').value.trim();
  const manoObra = parseFloat(document.getElementById('f-mano').value) || 0;
  const refacciones = parseFloat(document.getElementById('f-ref').value) || 0;
  if (!cliente || !fecha) { showToast('Fecha y cliente requeridos', 'red'); return; }
  const total = manoObra + refacciones;
  const ganancia = manoObra;
  if (id) {
    const idx = data.trabajos.findIndex(t => t.id === id);
    if (idx > -1) data.trabajos[idx] = { ...data.trabajos[idx], fecha, cliente, moto, trabajo, manoObra, refacciones, total, ganancia };
  } else {
    data.trabajos.push({ id: uid(), fecha, cliente, moto, trabajo, manoObra, refacciones, total, ganancia });
  }
  saveData(); closeModal(); render();
}

function saveGasto(id) {
  const fecha = document.getElementById('g-fecha').value;
  const concepto = document.getElementById('g-concepto').value.trim();
  const costo = parseFloat(document.getElementById('g-costo').value) || 0;
  if (!concepto || !fecha) { showToast('Fecha y concepto requeridos', 'red'); return; }
  if (id) {
    const idx = data.gastos.findIndex(g => g.id === id);
    if (idx > -1) data.gastos[idx] = { ...data.gastos[idx], fecha, concepto, costo };
  } else {
    data.gastos.push({ id: uid(), fecha, concepto, costo });
  }
  saveData(); closeModal(); render();
}

// ─── DELETE ──────────────────────────────────────────────────────
function confirmDelete(type, id) {
  const html = `
  <div class="modal-overlay" style="align-items:center" onclick="if(event.target===this)closeModal()">
    <div class="modal confirm-modal" style="border-radius:20px;max-width:320px;width:90%;margin:auto">
      <div style="text-align:center;padding:8px 0 16px">
        <div style="font-size:2.5rem">⚠️</div>
        <div class="modal-title" style="margin-top:8px">¿Eliminar?</div>
        <p style="color:var(--text2);font-size:0.9rem;margin-top:8px">Esta acción no se puede deshacer.</p>
      </div>
      <div class="form-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn-save" style="background:var(--red)" onclick="doDelete('${type}','${id}')">🗑 Eliminar</button>
      </div>
    </div>
  </div>`;
  document.getElementById('modal-container').innerHTML = html;
}

function doDelete(type, id) {
  if (type === 'trabajo') data.trabajos = data.trabajos.filter(j => j.id !== id);
  else data.gastos = data.gastos.filter(g => g.id !== id);
  saveData(); closeModal(); render(); showToast('Eliminado', 'red');
}

// ─── EXPORT CSV ──────────────────────────────────────────────────
function exportCSV() {
  const rows = [['Tipo','Fecha','Cliente','Moto','Trabajo','Mano de Obra','Refacciones','Total','Ganancia','Concepto','Costo']];
  (data.trabajos||[]).forEach(j => rows.push(['Trabajo',j.fecha,j.cliente,j.moto,j.trabajo,j.manoObra,j.refacciones,j.total,j.ganancia,'','']));
  (data.gastos||[]).forEach(g => rows.push(['Gasto',g.fecha,'','','','','','','',g.concepto,g.costo]));
  const csv = rows.map(r => r.map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `taller_finanzas_${today()}.csv`; a.click();
  showToast('CSV exportado ✓');
}

// ─── THEME ───────────────────────────────────────────────────────
function toggleTheme() {
  darkMode = !darkMode;
  document.body.classList.toggle('light', !darkMode);
  document.getElementById('theme-btn').textContent = darkMode ? '🌙' : '☀️';
  localStorage.setItem('taller_theme', darkMode ? 'dark' : 'light');
}

// ─── ESCAPE ──────────────────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ─── PWA MANIFEST ────────────────────────────────────────────────
function installPWA() {
  const manifest = {
    name: "Finanzas Taller", short_name: "Taller",
    start_url: ".", display: "standalone",
    background_color: "#0f1117", theme_color: "#f97316",
    icons: [{ src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23f97316'/><text y='.9em' font-size='80'>⚙</text></svg>", sizes: "192x192", type: "image/svg+xml" }]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
  document.getElementById('manifest-link').href = URL.createObjectURL(blob);
}

// ─── INIT ────────────────────────────────────────────────────────
loadData(); installPWA(); render();

// Keyboard shortcut: Escape closes modal
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
